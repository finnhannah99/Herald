  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<link rel=\"icon\" type=\"image/png\" href=\"25956c72-6ae4-4348-97a8-afcbdcef5a4e\">\n<script src=\"fcd95b12-5ec8-4c3a-b105-ca534fdf3bf9\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  html, body { margin: 0; padding: 0; }\n  * { box-sizing: border-box; font-optical-sizing: auto; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: linear-gradient(180deg, #f5f5f7 0%, #eef0f3 100%); color: #1d1d1f; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;\">\n\n  <!-- ==================== nav bar ==================== -->\n  <div style=\"position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.7); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); box-shadow: 0 1px 0 rgba(0,0,0,0.06);\">\n    <div style=\"max-width: 1080px; margin: 0 auto; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;\">\n      <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n        <span style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.015em; background: linear-gradient(135deg, #0071e3, #af52de); -webkit-background-clip: text; background-clip: text; color: transparent;\">Herald<span style=\"background: none; -webkit-background-clip: initial; background-clip: initial; color: rgba(60,60,67,0.55);\">Out<\u002Fspan><\u002Fspan>\n        <span style=\"font-size: 13px; color: rgba(60,60,67,0.55);\">Outreach report<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 14px;\">\n        <span style=\"font-size: 12px; color: rgba(60,60,67,0.5);\">{{ lastUpdatedLabel }}<\u002Fspan>\n        <button type=\"button\" onclick=\"{{ refresh }}\" style=\"font-family: inherit; font-size: 13px; font-weight: 600; color: #0071e3; background: rgba(0,113,227,0.08); border: none; border-radius: 999px; padding: 8px 16px; cursor: pointer;\">↻ Refresh<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width: 1080px; margin: 0 auto; padding: 36px 24px 96px;\">\n\n    <!-- ==================== loading state ==================== -->\n    <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 140px 0;\">\n        <div style=\"width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(0,113,227,0.15); border-top-color: #0071e3; animation: spin 0.9s linear infinite;\"><\u002Fdiv>\n        <span style=\"font-size: 14px; color: rgba(60,60,67,0.55);\">Pulling live data from Apollo…<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ==================== error state ==================== -->\n    <sc-if value=\"{{ hasError }}\">\n      <div style=\"max-width: 560px; margin: 100px auto; text-align: center; background: rgba(255,255,255,0.7); border-radius: 20px; padding: 40px 32px; box-shadow: 0 20px 40px -24px rgba(0,0,0,0.15);\">\n        <div style=\"font-size: 34px; margin-bottom: 12px;\">⚠︎<\u002Fdiv>\n        <h2 style=\"font-size: 20px; font-weight: 700; margin: 0 0 8px;\">Couldn't load Apollo data<\u002Fh2>\n        <p style=\"font-size: 14px; line-height: 1.6; color: rgba(60,60,67,0.7); margin: 0 0 20px;\">{{ errorMessage }}<\u002Fp>\n        <button type=\"button\" onclick=\"{{ refresh }}\" style=\"font-family: inherit; font-size: 14px; font-weight: 600; color: #fff; background: #0071e3; border: none; border-radius: 999px; padding: 10px 22px; cursor: pointer;\">Try again<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ==================== floating \"updating\" toast ==================== -->\n    <sc-if value=\"{{ showUpdatingToast }}\">\n      <div style=\"position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; align-items: center; gap: 10px; background: rgba(29,29,31,0.85); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); color: #fff; font-size: 13px; font-weight: 600; border-radius: 999px; padding: 12px 18px; box-shadow: 0 16px 32px -12px rgba(0,0,0,0.4); animation: rise 0.25s ease both;\">\n        <div style=\"width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; animation: spin 0.8s linear infinite;\"><\u002Fdiv>\n        <span>Updating from Apollo…<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ==================== data state ==================== -->\n    <sc-if value=\"{{ hasData }}\">\n\n      <sc-if value=\"{{ isDemo }}\">\n        <div style=\"display: flex; align-items: center; gap: 10px; background: rgba(255,149,0,0.12); border: 1px solid rgba(255,149,0,0.25); color: #b25f00; font-size: 13px; font-weight: 600; border-radius: 12px; padding: 10px 16px; margin-bottom: 20px;\">\n          <span>◐<\u002Fspan><span>Showing demo data — connect the Apollo API key on Netlify to go live.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 16px;\">\n        <div style=\"display: flex; align-items: center; gap: 8px;\">\n          <div style=\"display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.6); border-radius: 999px; padding: 4px;\">\n            <sc-for list=\"{{ dayOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n              <button type=\"button\" onclick=\"{{ opt.select }}\" style=\"font-family: inherit; font-size: 13px; font-weight: 600; border: none; border-radius: 999px; padding: 7px 14px; cursor: pointer; color: {{ opt.color }}; background: {{ opt.bg }}; transition: background .15s ease, color .15s ease;\">{{ opt.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"position: relative;\">\n            <button type=\"button\" onclick=\"{{ toggleCustomPanel }}\" style=\"font-family: inherit; font-size: 13px; font-weight: 600; border: none; border-radius: 999px; padding: 9px 16px; cursor: pointer; color: {{ isCustomActive_color }}; background: {{ isCustomActive_bg }}; white-space: nowrap;\">{{ customLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ customPanelOpen }}\">\n              <div style=\"position: absolute; top: calc(100% + 8px); left: 0; z-index: 60; background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 24px 48px -20px rgba(0,0,0,0.28); display: flex; flex-direction: column; gap: 12px; min-width: 220px;\">\n                <label style=\"display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600; color: rgba(60,60,67,0.6);\">From\n                  <input type=\"date\" value=\"{{ customFromDraft }}\" onchange=\"{{ onCustomFromChange }}\" style=\"font-family: inherit; font-size: 13px; padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.12);\">\n                <\u002Flabel>\n                <label style=\"display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600; color: rgba(60,60,67,0.6);\">To\n                  <input type=\"date\" value=\"{{ customToDraft }}\" onchange=\"{{ onCustomToChange }}\" style=\"font-family: inherit; font-size: 13px; padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.12);\">\n                <\u002Flabel>\n                <div style=\"display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px;\">\n                  <button type=\"button\" onclick=\"{{ cancelCustomPanel }}\" style=\"font-family: inherit; font-size: 13px; font-weight: 600; color: #1d1d1f; background: rgba(0,0,0,0.05); border: none; border-radius: 999px; padding: 7px 14px; cursor: pointer;\">Cancel<\u002Fbutton>\n                  <button type=\"button\" onclick=\"{{ applyCustomRange }}\" disabled=\"{{ customApplyDisabled }}\" style=\"font-family: inherit; font-size: 13px; font-weight: 600; color: #fff; background: #0071e3; border: none; border-radius: 999px; padding: 7px 14px; cursor: pointer; opacity: {{ customApplyOpacity }};\">Apply<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasCampaignChips }}\">\n          <div style=\"display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end;\">\n            <sc-for list=\"{{ campaignChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ chip.toggle }}\" style=\"font-family: inherit; font-size: 12.5px; font-weight: 600; border: none; border-radius: 999px; padding: 7px 14px; cursor: pointer; color: {{ chip.color }}; background: {{ chip.bg }}; transition: background .15s ease, color .15s ease; white-space: nowrap;\">{{ chip.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;\">\n        <h1 style=\"font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 0;\">{{ windowHeading }}<\u002Fh1>\n        <sc-if value=\"{{ isRefreshing }}\">\n          <span style=\"font-size: 12px; color: rgba(60,60,67,0.5);\">Updating…<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- stat cards -->\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 32px;\">\n        <sc-for list=\"{{ statCards }}\" as=\"card\" hint-placeholder-count=\"5\">\n          <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 16px; padding: 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 16px 32px -22px rgba(0,0,0,0.18); animation: rise 0.4s ease both;\">\n            <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(60,60,67,0.5); margin-bottom: 8px;\">{{ card.label }}<\u002Fdiv>\n            <div style=\"font-size: 30px; font-weight: 700; letter-spacing: -0.02em; color: {{ card.color }};\">{{ card.value }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- timeline -->\n      <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 18px; padding: 24px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 16px 32px -22px rgba(0,0,0,0.18); margin-bottom: 32px;\">\n        <div style=\"font-size: 15px; font-weight: 700; margin-bottom: 18px;\">Sends per day<\u002Fdiv>\n        <sc-if value=\"{{ hasTimeline }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display: flex; align-items: flex-end; gap: 3px; height: 140px;\">\n            <sc-for list=\"{{ timelineBars }}\" as=\"bar\" hint-placeholder-count=\"30\">\n              <div title=\"{{ bar.title }}\" style=\"flex: 1; min-width: 3px; height: {{ bar.height }}; background: linear-gradient(180deg, #0071e3, #af52de); border-radius: 3px 3px 0 0; opacity: {{ bar.opacity }};\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noTimeline }}\">\n          <div style=\"font-size: 13px; color: rgba(60,60,67,0.5); padding: 20px 0;\">No dated sends in this window yet.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- per-campaign breakdown -->\n      <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 18px; padding: 24px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 16px 32px -22px rgba(0,0,0,0.18); margin-bottom: 32px;\">\n        <div style=\"font-size: 15px; font-weight: 700; margin-bottom: 18px;\">By sequence<\u002Fdiv>\n        <sc-if value=\"{{ hasCampaigns }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n            <sc-for list=\"{{ campaignRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div>\n                <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 12px;\">\n                  <span style=\"font-size: 14px; font-weight: 600;\">{{ row.name }}<\u002Fspan>\n                  <span style=\"font-size: 12px; color: rgba(60,60,67,0.5); white-space: nowrap;\">{{ row.summary }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height: 8px; border-radius: 999px; background: rgba(0,0,0,0.06); overflow: hidden; display: flex;\">\n                  <div style=\"width: {{ row.openPct }}; background: #0071e3;\"><\u002Fdiv>\n                  <div style=\"width: {{ row.replyPct }}; background: #34c759;\"><\u002Fdiv>\n                  <div style=\"width: {{ row.bouncePct }}; background: #ff3b30;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noCampaigns }}\">\n          <div style=\"font-size: 13px; color: rgba(60,60,67,0.5);\">No sequences found in this window.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fsc-if>\n\n    <!-- ==================== individual emails (own filters, independent of the controls above) ==================== -->\n    <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 18px; padding: 24px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 16px 32px -22px rgba(0,0,0,0.18); margin-top: 32px;\">\n      <div style=\"font-size: 15px; font-weight: 700; margin-bottom: 16px;\">Sent emails ({{ emailCountLabel }})<\u002Fdiv>\n      <sc-if value=\"{{ hasEmailsError }}\">\n        <div style=\"display: flex; align-items: center; gap: 8px; background: rgba(255,59,48,0.08); border: 1px solid rgba(255,59,48,0.2); color: #b3261e; font-size: 12.5px; font-weight: 600; border-radius: 10px; padding: 9px 14px; margin-bottom: 14px;\">\n          <span>⚠︎<\u002Fspan><span>Couldn't load sent emails from Apollo: {{ emailsErrorMessage }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;\">\n        <input type=\"text\" placeholder=\"Search recipient…\" value=\"{{ emailQuery }}\" onchange=\"{{ onQueryChange }}\" style=\"font-family: inherit; font-size: 13px; padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(0,0,0,0.08); background: #fff; min-width: 180px; flex: 1 1 180px;\">\n        <select onchange=\"{{ onSubjectChange }}\" style=\"font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(0,0,0,0.08); background: #fff; max-width: 220px;\">\n          <sc-for list=\"{{ subjectOptions }}\" as=\"opt\" hint-placeholder-count=\"1\">\n            <option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n        <select onchange=\"{{ onSequenceChange }}\" style=\"font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(0,0,0,0.08); background: #fff; max-width: 200px;\">\n          <sc-for list=\"{{ sequenceOptions }}\" as=\"opt\" hint-placeholder-count=\"1\">\n            <option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n        <select onchange=\"{{ onStatusChange }}\" style=\"font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(0,0,0,0.08); background: #fff; max-width: 170px;\">\n          <sc-for list=\"{{ statusOptions }}\" as=\"opt\" hint-placeholder-count=\"1\">\n            <option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div style=\"max-height: 480px; overflow-y: auto; border-radius: 12px;\">\n        <sc-if value=\"{{ emailsReady }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-for list=\"{{ emailRows }}\" as=\"row\">\n                <\u002Fsc-for><\u002Fsc-if><sc-if value=\"{{ emailsLoading }}\">\n              <\u002Fsc-if><table style=\"width: 100%; border-collapse: collapse; font-size: 13px;\">\n          <thead>\n            <tr style=\"position: sticky; top: 0; background: rgba(255,255,255,0.95); text-align: left;\">\n              <th style=\"padding: 10px 12px; font-weight: 600; color: rgba(60,60,67,0.55); font-size: 11.5px; letter-spacing: 0.03em; text-transform: uppercase;\">Recipient<\u002Fth>\n              <th style=\"padding: 10px 12px; font-weight: 600; color: rgba(60,60,67,0.55); font-size: 11.5px; letter-spacing: 0.03em; text-transform: uppercase;\">Subject<\u002Fth>\n              <th style=\"padding: 10px 12px; font-weight: 600; color: rgba(60,60,67,0.55); font-size: 11.5px; letter-spacing: 0.03em; text-transform: uppercase;\">Sequence<\u002Fth>\n              <th style=\"padding: 10px 12px; font-weight: 600; color: rgba(60,60,67,0.55); font-size: 11.5px; letter-spacing: 0.03em; text-transform: uppercase;\">Status<\u002Fth>\n              <th style=\"padding: 10px 12px; font-weight: 600; color: rgba(60,60,67,0.55); font-size: 11.5px; letter-spacing: 0.03em; text-transform: uppercase;\">Sent<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr style=\"border-top: 1px solid rgba(0,0,0,0.05);\">\n                  <td style=\"padding: 10px 12px; color: #1d1d1f;\">{{ row.to }}<\u002Ftd>\n                  <td style=\"padding: 10px 12px; color: rgba(60,60,67,0.8); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ row.subject }}<\u002Ftd>\n                  <td style=\"padding: 10px 12px; color: rgba(60,60,67,0.6);\">{{ row.campaign }}<\u002Ftd>\n                  <td style=\"padding: 10px 12px;\"><span style=\"font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; color: {{ row.statusColor }}; background: {{ row.statusBg }};\">{{ row.status }}<\u002Fspan><\u002Ftd>\n                  <td style=\"padding: 10px 12px; color: rgba(60,60,67,0.5); white-space: nowrap;\">{{ row.sentAt }}<\u002Ftd>\n                <\u002Ftr>\n              \n            \n            <tr><td colspan=\"5\" style=\"padding: 16px 12px; color: rgba(60,60,67,0.5);\">Loading emails…<\u002Ftd><\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n        <sc-if value=\"{{ noEmails }}\">\n          <div style=\"font-size: 13px; color: rgba(60,60,67,0.5); padding: 16px 12px;\">No emails match these filters.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst STATUS_COLORS = {\n  delivered: { color: \"#0071e3\", bg: \"rgba(0,113,227,0.1)\" },\n  opened: { color: \"#af52de\", bg: \"rgba(175,82,222,0.12)\" },\n  clicked: { color: \"#af52de\", bg: \"rgba(175,82,222,0.12)\" },\n  not_opened: { color: \"rgba(60,60,67,0.6)\", bg: \"rgba(0,0,0,0.05)\" },\n  bounced: { color: \"#ff3b30\", bg: \"rgba(255,59,48,0.1)\" },\n  spam_blocked: { color: \"#ff3b30\", bg: \"rgba(255,59,48,0.1)\" },\n  unsubscribed: { color: \"#ff9500\", bg: \"rgba(255,149,0,0.12)\" },\n  scheduled: { color: \"rgba(60,60,67,0.6)\", bg: \"rgba(0,0,0,0.05)\" },\n  drafted: { color: \"rgba(60,60,67,0.6)\", bg: \"rgba(0,0,0,0.05)\" },\n};\n\nfunction pct(n) {\n  return `${Math.round((n || 0) * 100)}%`;\n}\n\nfunction fmtDate(iso) {\n  if (!iso) return \"—\";\n  const d = new Date(iso);\n  if (isNaN(d)) return \"—\";\n  return d.toLocaleDateString(undefined, { month: \"short\", day: \"numeric\" });\n}\n\nconst DAY_CHOICES = [7, 14, 30, 60, \"all\"];\n\nfunction todayMinus(n) {\n  const d = new Date();\n  d.setDate(d.getDate() - n);\n  return d.toISOString().slice(0, 10);\n}\n\nfunction fmtShortDate(iso) {\n  const d = new Date(iso + \"T00:00:00\");\n  if (isNaN(d)) return iso;\n  return d.toLocaleDateString(undefined, { month: \"short\", day: \"numeric\", year: \"numeric\" });\n}\n\nconst DEMO_CAMPAIGNS_META = [\n  { id: \"c1\", name: \"Growth Marketer Outreach\" },\n  { id: \"c2\", name: \"Proof-Led Follow-up\" },\n  { id: \"c3\", name: \"Warm Intro Sequence\" },\n  { id: \"c4\", name: \"Founder-to-Founder\" },\n];\n\nfunction buildDemoPool() {\n  const statuses = [\"delivered\", \"opened\", \"clicked\", \"not_opened\", \"bounced\", \"unsubscribed\"];\n  const names = [\"Jordan Lee\", \"Priya Shah\", \"Marcus Webb\", \"Ana Torres\", \"Diego Kim\", \"Sam Whitfield\", \"Rae Okafor\", \"Lena Voss\"];\n  const subjects = [\n    \"A growth marketer for {{company}}\",\n    \"What I'd bring to {{company}}\",\n    \"Quick question about {{company}}'s roadmap\",\n    \"Following up — {{first_name}}\",\n    \"3 things I noticed about {{company}}\",\n  ];\n  const pool = [];\n  const now = new Date();\n  for (let i = 0; i < 260; i++) {\n    const d = new Date(now);\n    d.setDate(d.getDate() - Math.floor(Math.random() * 120));\n    const campaign = DEMO_CAMPAIGNS_META[i % DEMO_CAMPAIGNS_META.length];\n    pool.push({\n      to: `${names[i % names.length].toLowerCase().replace(\" \", \".\")}@example.com`,\n      subject: subjects[i % subjects.length],\n      status: statuses[Math.floor(Math.random() * statuses.length)],\n      campaignId: campaign.id,\n      campaignName: campaign.name,\n      sentAt: d.toISOString(),\n      replied: Math.random() < 0.15,\n    });\n  }\n  return pool;\n}\n\nfunction aggregateEmails(pool, availableCampaigns, days, campaignIdsFilter) {\n  const isCustom = days && typeof days === \"object\" && days.from && days.to;\n  const isAllTime = days === \"all\";\n  let cutoff = null, upper = null;\n  if (isCustom) {\n    cutoff = new Date(days.from + \"T00:00:00\");\n    upper = new Date(days.to + \"T23:59:59\");\n  } else if (!isAllTime) {\n    cutoff = new Date();\n    cutoff.setDate(cutoff.getDate() - days);\n  }\n  const filtered = pool.filter((e) => {\n    const t = new Date(e.sentAt);\n    if (cutoff && t < cutoff) return false;\n    if (upper && t > upper) return false;\n    if (campaignIdsFilter && campaignIdsFilter.length && !campaignIdsFilter.includes(e.campaignId)) return false;\n    return true;\n  });\n\n  const byCampaign = {};\n  const byDay = {};\n  let opened = 0, replied = 0, bounced = 0;\n\n  for (const e of filtered) {\n    if (!byCampaign[e.campaignId]) byCampaign[e.campaignId] = { id: e.campaignId, name: e.campaignName, sent: 0, opened: 0, replied: 0, bounced: 0 };\n    byCampaign[e.campaignId].sent += 1;\n    const isOpened = [\"opened\", \"clicked\", \"unsubscribed\"].includes(e.status);\n    const isBounced = e.status === \"bounced\";\n    const isReplied = !!e.replied;\n    if (isOpened) { opened += 1; byCampaign[e.campaignId].opened += 1; }\n    if (isBounced) { bounced += 1; byCampaign[e.campaignId].bounced += 1; }\n    if (isReplied) { replied += 1; byCampaign[e.campaignId].replied += 1; }\n    const day = e.sentAt.slice(0, 10);\n    byDay[day] = (byDay[day] || 0) + 1;\n  }\n\n  const sent = filtered.length;\n  const timeline = Object.entries(byDay)\n    .sort(([a], [b]) => a.localeCompare(b))\n    .map(([date, count]) => ({ date, count }));\n\n  const emails = [...filtered].sort((a, b) => b.sentAt.localeCompare(a.sentAt)).slice(0, 500).map((e) => ({\n    to: e.to,\n    subject: e.subject,\n    status: e.status,\n    campaign: e.campaignName,\n    sentAt: e.sentAt,\n  }));\n\n  return {\n    generatedAt: new Date().toISOString(),\n    windowDays: isCustom ? null : days,\n    customRange: isCustom ? { from: days.from, to: days.to } : null,\n    availableCampaigns,\n    totals: {\n      sent,\n      delivered: sent - bounced,\n      opened,\n      replied,\n      bounced,\n      openRate: sent ? opened / sent : 0,\n      replyRate: sent ? replied / sent : 0,\n      bounceRate: sent ? bounced / sent : 0,\n    },\n    campaigns: Object.values(byCampaign).sort((a, b) => b.sent - a.sent),\n    timeline,\n    emails,\n  };\n}\n\nclass Component extends DCLogic {\n  state = {\n    loading: true, refreshing: false, error: null, data: null, demo: false, days: 30, selectedCampaignIds: [],\n    emailsAll: null, emailsLoading: true, emailsDemo: false, emailsError: null, emailsFetchingMore: false,\n    emailQuery: \"\", emailSubject: \"\", emailSequence: \"\", emailStatus: \"\",\n    customPanelOpen: false, customFromDraft: \"\", customToDraft: \"\",\n  };\n\n  componentDidMount() {\n    this.load(30, []);\n    this.loadAllEmails();\n  }\n\n  // Pulls every page for a given range/sequence filter by repeatedly calling the\n  // function with an advancing cursor (each call is one bounded, rate-limit-safe\n  // chunk server-side). Calls onProgress after every chunk so callers can update\n  // the UI as data streams in, instead of blocking on the entire pull.\n  async fetchPool(daysSpec, campaignIds, onProgress) {\n    let pool = [];\n    let availableCampaigns = [];\n    let cursor = 1;\n    let hasMore = true;\n    let chunkIndex = 0;\n    const maxChunks = 40; // safety cap: ~40 chunks * ~600 msgs = up to 24,000 messages\n    while (hasMore && chunkIndex < maxChunks) {\n      chunkIndex += 1;\n      const qs = new URLSearchParams();\n      if (daysSpec && typeof daysSpec === \"object\" && daysSpec.from && daysSpec.to) {\n        qs.set(\"from\", daysSpec.from);\n        qs.set(\"to\", daysSpec.to);\n      } else {\n        qs.set(\"days\", String(daysSpec));\n      }\n      if (campaignIds && campaignIds.length) qs.set(\"campaign_ids\", campaignIds.join(\",\"));\n      qs.set(\"cursor\", String(cursor));\n\n      let res;\n      try {\n        res = await fetch(`/.netlify/functions/apollo-stats?${qs.toString()}`);\n      } catch (networkErr) {\n        if (chunkIndex === 1) {\n          const e = new Error(\"unreachable\");\n          e.unreachable = true;\n          throw e;\n        }\n        break; // keep whatever we already gathered\n      }\n\n      const contentType = res.headers.get(\"content-type\") || \"\";\n      if (!contentType.includes(\"application/json\")) {\n        if (chunkIndex === 1) {\n          const e = new Error(\"unreachable\");\n          e.unreachable = true;\n          throw e;\n        }\n        break;\n      }\n\n      const json = await res.json();\n      if (!res.ok || json.error) {\n        if (chunkIndex === 1) throw new Error(json.error || `Request failed (${res.status})`);\n        break; // deployed and reachable, but a later chunk failed — keep the real data collected so far\n      }\n\n      pool = pool.concat(json.messages || []);\n      if (json.availableCampaigns && json.availableCampaigns.length) availableCampaigns = json.availableCampaigns;\n      hasMore = !!json.hasMore;\n      cursor = json.nextCursor || cursor + 1;\n      if (onProgress) onProgress({ pool, availableCampaigns, done: !hasMore });\n    }\n    return { pool, availableCampaigns };\n  }\n\n  async loadAllEmails() {\n    this.setState({ emailsLoading: true, emailsError: null });\n    const runId = (this._emailsRunId = (this._emailsRunId || 0) + 1);\n    try {\n      const { pool, availableCampaigns } = await this.fetchPool(\"all\", [], ({ pool, availableCampaigns, done }) => {\n        if (this._emailsRunId !== runId) return;\n        const data = aggregateEmails(pool, availableCampaigns, \"all\", []);\n        this.setState({ emailsLoading: false, emailsAll: data, emailsDemo: false, emailsFetchingMore: !done });\n      });\n      if (this._emailsRunId !== runId) return;\n      const data = aggregateEmails(pool, availableCampaigns, \"all\", []);\n      this.setState({ emailsLoading: false, emailsAll: data, emailsDemo: false, emailsFetchingMore: false });\n    } catch (e) {\n      if (this._emailsRunId !== runId) return;\n      if (e.unreachable) {\n        this.applyDemoEmails();\n        return;\n      }\n      this.setState({ emailsLoading: false, emailsFetchingMore: false, emailsError: e.message || String(e) });\n    }\n  }\n\n  applyDemoEmails() {\n    if (!this._demoPool) this._demoPool = buildDemoPool();\n    const data = aggregateEmails(this._demoPool, DEMO_CAMPAIGNS_META, \"all\", []);\n    this.setState({ emailsLoading: false, emailsFetchingMore: false, emailsAll: data, emailsDemo: true, emailsError: null });\n  }\n\n  setEmailQuery = (v) => this.setState({ emailQuery: v });\n  setEmailSubject = (v) => this.setState({ emailSubject: v });\n  setEmailSequence = (v) => this.setState({ emailSequence: v });\n  setEmailStatus = (v) => this.setState({ emailStatus: v });\n\n  selectDays = (d) => this.load(d, this.state.selectedCampaignIds);\n\n  toggleCampaign = (id) => {\n    const cur = this.state.selectedCampaignIds || [];\n    const next = cur.includes(id) ? cur.filter((x) => x !== id) : [...cur, id];\n    this.load(this.state.days, next);\n  };\n\n  clearCampaigns = () => this.load(this.state.days, []);\n\n  toggleCustomPanel = () => {\n    const opening = !this.state.customPanelOpen;\n    this.setState({\n      customPanelOpen: opening,\n      customFromDraft: opening ? (this.state.customFromDraft || todayMinus(30)) : this.state.customFromDraft,\n      customToDraft: opening ? (this.state.customToDraft || todayMinus(0)) : this.state.customToDraft,\n    });\n  };\n\n  cancelCustomPanel = () => this.setState({ customPanelOpen: false });\n\n  setCustomFrom = (v) => this.setState({ customFromDraft: v });\n  setCustomTo = (v) => this.setState({ customToDraft: v });\n\n  applyCustomRange = () => {\n    const { customFromDraft, customToDraft } = this.state;\n    if (!customFromDraft || !customToDraft) return;\n    this.setState({ customPanelOpen: false });\n    this.load({ from: customFromDraft, to: customToDraft }, this.state.selectedCampaignIds);\n  };\n\n  async load(days, campaignIds) {\n    const isInitial = !this.state.data;\n    this.setState({ loading: isInitial, refreshing: !isInitial, error: null });\n    const runId = (this._loadRunId = (this._loadRunId || 0) + 1);\n    try {\n      const { pool, availableCampaigns } = await this.fetchPool(days, campaignIds, ({ pool, availableCampaigns }) => {\n        if (this._loadRunId !== runId) return;\n        const data = aggregateEmails(pool, availableCampaigns, days, campaignIds);\n        this.setState({ loading: false, refreshing: true, error: null, data, demo: false, days, selectedCampaignIds: campaignIds });\n      });\n      if (this._loadRunId !== runId) return;\n      const data = aggregateEmails(pool, availableCampaigns, days, campaignIds);\n      this.setState({ loading: false, refreshing: false, error: null, data, demo: false, days, selectedCampaignIds: campaignIds });\n    } catch (e) {\n      if (this._loadRunId !== runId) return;\n      if (e.unreachable) {\n        this.applyDemo(days, campaignIds);\n        return;\n      }\n      this.setState({ loading: false, refreshing: false, error: e.message || String(e), data: null, demo: false });\n    }\n  }\n\n  applyDemo(days, campaignIds) {\n    if (!this._demoPool) this._demoPool = buildDemoPool();\n    const data = aggregateEmails(this._demoPool, DEMO_CAMPAIGNS_META, days, campaignIds);\n    this.setState({ loading: false, refreshing: false, error: null, data, demo: true, days, selectedCampaignIds: campaignIds });\n  }\n\n  renderVals() {\n    const { loading, error, data, demo, refreshing, days, selectedCampaignIds, emailsAll, emailsLoading, emailsDemo, emailsError, emailsFetchingMore, emailQuery, emailSubject, emailSequence, emailStatus, customPanelOpen, customFromDraft, customToDraft } = this.state;\n    const refresh = () => this.load(days, selectedCampaignIds);\n\n    // ---- Sent-emails table: independent of the top day/sequence controls ----\n    const allEmails = (emailsAll && emailsAll.emails) || [];\n    const uniqueSubjects = [...new Set(allEmails.map((e) => e.subject))];\n    const uniqueSequences = [...new Set(allEmails.map((e) => e.campaign))];\n    const uniqueStatuses = [...new Set(allEmails.map((e) => e.status))];\n    const q = (emailQuery || \"\").trim().toLowerCase();\n    const filteredEmails = allEmails.filter((e) => {\n      if (q && !(e.to || \"\").toLowerCase().includes(q)) return false;\n      if (emailSubject && e.subject !== emailSubject) return false;\n      if (emailSequence && e.campaign !== emailSequence) return false;\n      if (emailStatus && e.status !== emailStatus) return false;\n      return true;\n    });\n    const emailRows = filteredEmails.map((e) => {\n      const sc = STATUS_COLORS[e.status] || { color: \"rgba(60,60,67,0.6)\", bg: \"rgba(0,0,0,0.05)\" };\n      return {\n        to: e.to,\n        subject: e.subject,\n        campaign: e.campaign,\n        status: e.status,\n        statusColor: sc.color,\n        statusBg: sc.bg,\n        sentAt: fmtDate(e.sentAt),\n      };\n    });\n    const emailCountLabel = emailsLoading ? \"…\" : `${filteredEmails.length} of ${allEmails.length}`;\n    const subjectOptions = [{ value: \"\", label: \"All subjects\" }, ...uniqueSubjects.map((s) => ({ value: s, label: s }))];\n    const sequenceOptions = [{ value: \"\", label: \"All sequences\" }, ...uniqueSequences.map((s) => ({ value: s, label: s }))];\n    const statusOptions = [{ value: \"\", label: \"All statuses\" }, ...uniqueStatuses.map((s) => ({ value: s, label: s }))];\n    const onQueryChange = (e) => this.setEmailQuery(e.target.value);\n    const onSubjectChange = (e) => this.setEmailSubject(e.target.value);\n    const onSequenceChange = (e) => this.setEmailSequence(e.target.value);\n    const onStatusChange = (e) => this.setEmailStatus(e.target.value);\n\n    const emailsReady = !emailsLoading;\n    const showUpdatingToast = !!refreshing || (!!emailsLoading && !loading) || !!emailsFetchingMore;\n    const hasEmailsError = !!emailsError && !emailsDemo && emailRows.length === 0;\n    const emailsSectionVals = {\n      showUpdatingToast,\n      hasEmails: emailRows.length > 0,\n      noEmails: emailsReady && emailRows.length === 0 && !hasEmailsError,\n      hasEmailsError,\n      emailsErrorMessage: emailsError || \"\",\n      emailCountLabel,\n      emailRows,\n      emailQuery,\n      onQueryChange,\n      subjectOptions,\n      sequenceOptions,\n      statusOptions,\n      onSubjectChange,\n      onSequenceChange,\n      onStatusChange,\n      emailsLoading: !!emailsLoading,\n      emailsReady,\n      anyDemo: !!demo || !!emailsDemo,\n    };\n\n    if (loading) {\n      return { isLoading: true, hasError: false, hasData: false, lastUpdatedLabel: \"\", refresh, ...emailsSectionVals };\n    }\n    if (error || !data) {\n      return {\n        isLoading: false,\n        hasError: true,\n        hasData: false,\n        lastUpdatedLabel: \"\",\n        errorMessage: error || \"No data returned.\",\n        refresh,\n        ...emailsSectionVals,\n      };\n    }\n\n    const totals = data.totals || {};\n    const statCards = [\n      { label: \"Sent\", value: totals.sent ?? 0, color: \"#1d1d1f\" },\n      { label: \"Delivered\", value: totals.delivered ?? 0, color: \"#0071e3\" },\n      { label: \"Open rate\", value: pct(totals.openRate), color: \"#af52de\" },\n      { label: \"Reply rate\", value: pct(totals.replyRate), color: \"#34c759\" },\n      { label: \"Bounce rate\", value: pct(totals.bounceRate), color: \"#ff3b30\" },\n    ];\n\n    const timeline = data.timeline || [];\n    const maxCount = Math.max(1, ...timeline.map((t) => t.count));\n    const timelineBars = timeline.map((t) => ({\n      height: `${Math.max(4, Math.round((t.count / maxCount) * 130))}px`,\n      opacity: 0.55 + 0.45 * (t.count / maxCount),\n      title: `${t.date}: ${t.count} sent`,\n    }));\n\n    const campaigns = data.campaigns || [];\n    const campaignRows = campaigns.map((c) => ({\n      name: c.name,\n      summary: `${c.sent} sent · ${pct(c.sent ? c.opened / c.sent : 0)} opened · ${pct(c.sent ? c.replied / c.sent : 0)} replied`,\n      openPct: pct(c.sent ? c.opened / c.sent : 0),\n      replyPct: pct(c.sent ? c.replied / c.sent : 0),\n      bouncePct: pct(c.sent ? c.bounced / c.sent : 0),\n    }));\n\n    const isCustom = !!(data.customRange);\n    const dayOptions = DAY_CHOICES.map((d) => {\n      const active = !isCustom && d === days;\n      return {\n        label: d === \"all\" ? \"All time\" : `${d}d`,\n        select: () => this.selectDays(d),\n        color: active ? \"#ffffff\" : \"#1d1d1f\",\n        bg: active ? \"#0071e3\" : \"transparent\",\n      };\n    });\n\n    const customLabel = isCustom ? `${fmtShortDate(data.customRange.from)} – ${fmtShortDate(data.customRange.to)}` : \"Custom range\";\n    const onCustomFromChange = (e) => this.setCustomFrom(e.target.value);\n    const onCustomToChange = (e) => this.setCustomTo(e.target.value);\n    const customApplyDisabled = !customFromDraft || !customToDraft;\n\n    const availableCampaigns = data.availableCampaigns || [];\n    const chipDefs = [{ id: null, label: \"All sequences\" }, ...availableCampaigns.map((c) => ({ id: c.id, label: c.name }))];\n    const campaignChips = chipDefs.map((c) => {\n      const active = c.id === null ? selectedCampaignIds.length === 0 : selectedCampaignIds.includes(c.id);\n      return {\n        label: c.label,\n        toggle: () => (c.id === null ? this.clearCampaigns() : this.toggleCampaign(c.id)),\n        color: active ? \"#ffffff\" : \"#1d1d1f\",\n        bg: active ? \"#af52de\" : \"rgba(0,0,0,0.05)\",\n      };\n    });\n\n    return {\n      isLoading: false,\n      hasError: false,\n      hasData: true,\n      isDemo: !!demo || !!emailsDemo,\n      isRefreshing: !!refreshing,\n      lastUpdatedLabel: `Updated ${new Date(data.generatedAt).toLocaleTimeString([], { hour: \"2-digit\", minute: \"2-digit\" })}`,\n      windowDaysLabel: isCustom ? `${fmtShortDate(data.customRange.from)} – ${fmtShortDate(data.customRange.to)}` : (data.windowDays === \"all\" ? \"all time\" : `${data.windowDays || 30} days`),\n      windowHeading: isCustom ? `${fmtShortDate(data.customRange.from)} – ${fmtShortDate(data.customRange.to)}` : (data.windowDays === \"all\" ? \"All time\" : `Last ${data.windowDays || 30} days`),\n      dayOptions,\n      customLabel,\n      isCustomActive: isCustom,\n      isCustomActive_color: isCustom ? \"#ffffff\" : \"#1d1d1f\",\n      isCustomActive_bg: isCustom ? \"#0071e3\" : \"rgba(255,255,255,0.6)\",\n      customPanelOpen: !!customPanelOpen,\n      customFromDraft: customFromDraft || \"\",\n      customToDraft: customToDraft || \"\",\n      customApplyDisabled,\n      customApplyOpacity: customApplyDisabled ? 0.5 : 1,\n      onCustomFromChange,\n      onCustomToChange,\n      toggleCustomPanel: this.toggleCustomPanel,\n      cancelCustomPanel: this.cancelCustomPanel,\n      applyCustomRange: this.applyCustomRange,\n      hasCampaignChips: campaignChips.length > 1,\n      campaignChips,\n      statCards,\n      hasTimeline: timelineBars.length > 0,\n      noTimeline: timelineBars.length === 0,\n      timelineBars,\n      hasCampaigns: campaignRows.length > 0,\n      noCampaigns: campaignRows.length === 0,\n      campaignRows,\n      refresh,\n      ...emailsSectionVals,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
