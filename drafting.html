document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1d252768-cb64-4b6f-9e02-54574caa4aa4\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  html, body { margin: 0; padding: 0; }\n  * { box-sizing: border-box; font-optical-sizing: auto; }\n  input::placeholder, textarea::placeholder { color: rgba(60,60,67,0.38); }\n  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes blink { 50% { opacity: 0; } }\n  @keyframes driftA { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-24px, 18px); } }\n  @keyframes driftB { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px, -16px); } }\n  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }\n<\u002Fstyle>\n\n<script src=\"https://assets.calendly.com/assets/external/widget.js\" async=\"\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; position: relative; background: {{ pageBg }}; color: #1d1d1f; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; overflow-x: hidden;\">\n\n  <!-- ==================== ambient depth field ==================== -->\n  <div style=\"position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;\">\n    <div style=\"position: absolute; top: -220px; left: 50%; width: 900px; height: 620px; transform: translateX(-50%); background: radial-gradient(circle at 30% 30%, {{ tintGlowStrong }}, transparent 60%), radial-gradient(circle at 75% 60%, rgba(255,45,85,0.10), transparent 55%); filter: blur(10px);\"><\u002Fdiv>\n    <div style=\"position: absolute; top: 60px; right: -160px; width: 640px; height: 640px; background: radial-gradient(circle, rgba(175,82,222,0.14), transparent 65%); filter: blur(6px); animation: driftA 14s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position: absolute; top: 380px; left: -140px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(255,149,0,0.12), transparent 65%); filter: blur(6px); animation: driftB 17s ease-in-out infinite;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ==================== nav bar ==================== -->\n  <div style=\"position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.55); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); box-shadow: 0 1px 0 rgba(0,0,0,0.04);\">\n    <div style=\"max-width: 760px; margin: 0 auto; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;\">\n      <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n        <span style=\"display: inline-block; font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: 36px; line-height: 1.3; font-weight: 700; letter-spacing: -0.015em; padding-right: 3px; background: linear-gradient(135deg, {{ tint }}, {{ tintDeep }}); -webkit-background-clip: text; background-clip: text; color: transparent\">Herald<\u002Fspan><span style=\"font-size: 12px; color: rgba(60,60,67,0.55);\">Job applications, done for you<\u002Fspan>\n      <\u002Fdiv><div style=\"display: flex; align-items: center; gap: 8px;\">\n        <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <span style=\"display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: {{ st.weight }}; letter-spacing: 0.02em; color: {{ st.color }}; background: {{ st.bg }}; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); border-radius: 999px; padding: 7px 13px; box-shadow: {{ st.shadow }}; transition: background .2s ease, color .2s ease;\">{{ st.text }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ==================== NO ANSWERS FOUND ==================== -->\n  <sc-if value=\"{{ isMissing }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px;\">\n      <div style=\"min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px;\">\n        <h1 style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: clamp(26px, 5vw, 38px); font-weight: 700; letter-spacing: -0.015em; margin: 0;\">No answers found yet<\u002Fh1>\n        <p style=\"font-size: 15px; color: rgba(60,60,67,0.78); margin: 0;\">Start with the questionnaire so Herald has something to draft from.<\u002Fp>\n        <a href=\"index.html\" style=\"margin-top: 10px; font-size: 17px; font-weight: 600; color: #ffffff; background: {{ tint }}; border-radius: 12px; padding: 13px 24px; text-decoration: none;\">Go to the Questionnaire<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== LOADING ==================== -->\n  <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px;\">\n      <div style=\"min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px;\">\n        <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: {{ tint }};\">Drafting<\u002Fdiv>\n        <h1 style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: clamp(28px, 5vw, 44px); font-weight: 700; letter-spacing: -0.015em; margin: 0; display: flex; align-items: center; gap: 10px;\">Typing your five pitches {{ caret }}<\u002Fh1>\n        <p aria-live=\"polite\" style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 14px; color: rgba(60,60,67,0.78); margin: 0;\">{{ loadMsg }}<\u002Fp>\n        <p style=\"font-size: 13px; color: rgba(60,60,67,0.55); margin: 16px 0 0;\">Usually under a minute. Your answers, CV and tone document are being read together.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== DRAFTS ==================== -->\n  <sc-if value=\"{{ isDrafts }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 96px;\">\n      <div style=\"padding: 48px 0 24px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px; max-width: 540px;\">\n          <h1 style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: clamp(30px, 5vw, 44px); font-weight: 700; letter-spacing: -0.015em; line-height: 1.05; margin: 0;\">Five ways to knock.<\u002Fh1>\n          <p style=\"font-size: 15px; line-height: 1.55; color: rgba(60,60,67,0.78); margin: 0;\">{{ draftsIntro }} The <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; color: {{ tint }};\">{{ fieldsToken }}<\u002Fspan> tokens are Apollo merge variables — they stay as tokens here and fill in per recipient when your campaign sends.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 8px;\">\n          <a href=\"index.html\" style=\"font-family: inherit; font-size: 15px; font-weight: 600; color: {{ tint }}; background: transparent; border: 1px solid {{ tint }}; border-radius: 12px; padding: 9px 16px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center;\">Edit Answers<\u002Fa>\n          <button type=\"button\" onclick=\"{{ redraft }}\" style=\"font-family: inherit; font-size: 15px; font-weight: 600; color: {{ tint }}; background: transparent; border: 1px solid {{ tint }}; border-radius: 12px; padding: 9px 16px; cursor: pointer;\">Redraft All Five<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasApiNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background: rgba(255,149,0,0.14); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 14px; line-height: 1.5; color: #8a5a00;\">{{ apiNote }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-for list=\"{{ draftCards }}\" as=\"d\" hint-placeholder-count=\"5\">\n        <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-radius: 20px; padding: 28px; margin-bottom: 20px; animation: rise 0.5s ease both; animation-delay: {{ d.delay }}; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 1px 0 rgba(0,0,0,0.03);\">\n          <div style=\"display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px;\">\n            <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: {{ d.accent }};\">Draft {{ d.idx }} · {{ d.approach }}<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px;\">\n              <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 11px; color: rgba(60,60,67,0.55);\">{{ d.words }} WORDS<\u002Fspan>\n              <button type=\"button\" onclick=\"{{ d.onRedraftOne }}\" disabled=\"{{ d.isRedrafting }}\" style=\"font-family: inherit; font-size: 12px; font-weight: 600; color: {{ d.accent }}; background: {{ d.accentSoft }}; border: none; border-radius: 999px; padding: 5px 12px; cursor: pointer; white-space: nowrap;\" style-hover=\"filter: brightness(0.95);\">{{ d.redraftLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size: 13px; color: rgba(60,60,67,0.55); margin: 4px 0 18px;\">{{ d.tag }}<\u002Fp>\n\n          <div style=\"display: flex; align-items: center; gap: 10px; padding-bottom: 12px; margin-bottom: 14px; box-shadow: 0 1px 0 rgba(60,60,67,0.18);\">\n            <label for=\"subj-{{ d.i }}\" style=\"font-size: 13px; color: rgba(60,60,67,0.55); white-space: nowrap;\">Subject:<\u002Flabel>\n            <input id=\"subj-{{ d.i }}\" type=\"text\" placeholder=\"Subject line\" value=\"{{ d.subject }}\" onchange=\"{{ d.onSubject }}\" style=\"font-family: inherit; font-size: 15px; font-weight: 600; color: #1d1d1f; background: transparent; border: none; border-radius: 8px; padding: 6px 8px; width: 100%;\" style-focus=\"outline: none; background: #f2f2f7;\">\n          <\u002Fdiv>\n\n          <textarea rows=\"9\" value=\"{{ d.body }}\" onchange=\"{{ d.onBody }}\" ref=\"{{ d.bodyRef }}\" aria-label=\"Email body for draft {{ d.idx }}\" style=\"font-family: inherit; font-size: 15px; color: #1d1d1f; background: #f2f2f7; border: none; border-radius: 10px; padding: 12px 14px; line-height: 1.6; resize: vertical; width: 100%;\" style-focus=\"outline: none; box-shadow: 0 0 0 4px {{ tintHalo }};\"><\u002Ftextarea>\n\n          <div style=\"display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 16px;\">\n            <span style=\"font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(60,60,67,0.55);\">Insert a merge field:<\u002Fspan>\n            <sc-for list=\"{{ d.vars }}\" as=\"v\" hint-placeholder-count=\"6\">\n              <button type=\"button\" title=\"Insert at cursor\" onclick=\"{{ v.insert }}\" style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: {{ d.accent }}; background: {{ d.accentSoft }}; border: none; border-radius: 6px; padding: 5px 9px; cursor: pointer;\" style-hover=\"filter: brightness(0.95);\">{{ v.token }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"display: flex; align-items: center; gap: 18px; flex-wrap: wrap; margin-top: 28px;\">\n        <button type=\"button\" onclick=\"{{ save }}\" style=\"font-family: inherit; font-size: 17px; font-weight: 600; color: #ffffff; background: {{ saveBg }}; border: none; border-radius: 12px; padding: 13px 24px; cursor: pointer;\">{{ saveLabel }}<\u002Fbutton>\n        <div style=\"font-size: 13px; color: rgba(60,60,67,0.55);\">{{ saveNote }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== SHEET / MODAL ==================== -->\n  <sc-if value=\"{{ showModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modal-title\" style=\"position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.25);\">\n      <div onclick=\"{{ stopProp }}\" style=\"width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; background: rgba(255,255,255,0.86); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border-radius: 16px; padding: 32px; animation: rise 0.4s ease both; display: flex; flex-direction: column; gap: 14px;\">\n        <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: {{ tint }};\">Next step · Advisor<\u002Fdiv>\n        <h2 id=\"modal-title\" style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.15; margin: 0;\">Talk it through with an advisor<\u002Fh2>\n        <p style=\"font-size: 15px; line-height: 1.55; color: rgba(60,60,67,0.78); margin: 0;\">Your drafts are saved. Book a short call to set your sending volume, refine the audience and choose a package — then we build your Apollo lists and start sending.<\u002Fp>\n        <div ref=\"{{ calendlyRef }}\" class=\"calendly-inline-widget\" data-url=\"https://calendly.com/finnhannah99/30min?hide_event_type_details=1&amp;hide_gdpr_banner=1\" style=\"min-width: 320px; width: 100%; height: 560px; margin-top: 4px; border-radius: 12px; overflow: hidden;\"><\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ closeModal }}\" style=\"font-family: inherit; font-size: 15px; font-weight: 600; color: {{ tint }}; background: transparent; border: none; border-radius: 12px; padding: 11px 24px; cursor: pointer;\">Not Now<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== footer ==================== -->\n  <div style=\"position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 40px;\">\n    <div style=\"padding-top: 20px; box-shadow: 0 -1px 0 rgba(60,60,67,0.18) inset; border-top: 1px solid rgba(60,60,67,0.18); font-size: 11px; letter-spacing: 0.04em; color: rgba(60,60,67,0.55);\">HERALD · PROTOTYPE — ANSWERS &amp; DRAFTS STAY IN THIS TAB; NOTHING IS STORED OR EMAILED YET<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst CAL_URL = \"https://calendar.app.google/UxP5JADAQdS2Jaf6A\";\nconst APOLLO_VARS = [\"{{first_name}}\", \"{{last_name}}\", \"{{company}}\", \"{{title}}\", \"{{industry}}\", \"{{city}}\"];\nconst APPROACHES = [\n  { name: \"The Direct Pitch\", tag: \"Your value, stated plainly\" },\n  { name: \"The Problem-Solver\", tag: \"Opens on a pain point they'll recognise\" },\n  { name: \"The Proof-Led\", tag: \"Leads with your strongest result\" },\n  { name: \"The Curious Question\", tag: \"Short, question-first, easy to answer\" },\n  { name: \"The Warm Familiar\", tag: \"Reads like a note from a known contact\" },\n];\nconst LOAD_MSGS = [\"Reading your CV…\", \"Borrowing your tone of voice…\", \"Studying your targets…\", \"Typing five different openers…\", \"Proofreading the drafts…\"];\n\nfunction hexToRgba(hex, a) {\n  const h = (hex || \"#007aff\").replace(\"#\", \"\");\n  const n = parseInt(h.length === 3 ? h.split(\"\").map((c) => c + c).join(\"\") : h, 16);\n  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;\n}\n\nconst STORAGE_KEY = \"herald_state_v1\";\nfunction saveState(state) {\n  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (err) {}\n}\nfunction loadState() {\n  try {\n    const raw = sessionStorage.getItem(STORAGE_KEY);\n    return raw ? JSON.parse(raw) : null;\n  } catch (err) {\n    return null;\n  }\n}\n\nfunction buildPrompt(form, cv, tone) {\n  const lines = [\n    \"You are the in-house copywriter for Herald, a service that pitches candidates directly to companies over cold email.\",\n    \"\",\n    \"Write exactly 5 cold outreach emails pitching the candidate below for the role they want. One email per approach, in this order:\",\n    '1. \"The Direct Pitch\" — straightforward value proposition.',\n    '2. \"The Problem-Solver\" — open on a pain point the target companies likely feel.',\n    \"3. \\\"The Proof-Led\\\" — lead with the candidate's strongest concrete result.\",\n    '4. \"The Curious Question\" — short and question-led; easy to reply to.',\n    '5. \"The Warm Familiar\" — warm, familiar register, as if the sender knows the company well.',\n    \"\",\n    \"Rules:\",\n    \"- 60 to 90 words per email body. Subject lines under 7 words.\",\n    \"- Use these Apollo merge variables literally where personalisation belongs: {{first_name}}, {{company}}, {{title}}, {{industry}}. Never invent recipient names or company names.\",\n    \"- Match the candidate's tone-of-voice samples if provided; otherwise professional but human.\",\n    \"- Reference the candidate's real experience. Sign off with the candidate's first name.\",\n    \"- Use \\\\n for line breaks inside the body.\",\n    '- Respond with ONLY a valid JSON array, no markdown fences, exactly: [{\"approach\":\"...\",\"subject\":\"...\",\"body\":\"...\"}] with 5 items.',\n    \"\",\n    \"CANDIDATE PROFILE\",\n    `Name: ${form.name}`,\n    `Role they are pitching for: ${form.role}`,\n    `Email intention: ${form.intention}`,\n    `Experience and skills to reference: ${form.experience}`,\n    `Target people: ${form.targetPeople}`,\n    `Target industries: ${form.industries}`,\n    `Target company sizes: ${form.sizes.join(\", \")}`,\n    `Target locations: ${form.locations}`,\n  ];\n  if (cv && cv.kind === \"pdf\") lines.push(\"\", \"The candidate's CV is attached as a PDF document.\");\n  if (cv && cv.kind === \"docx\") lines.push(\"\", \"CV (text extracted from .docx):\", cv.text);\n  if (tone && tone.kind === \"pdf\") lines.push(\"\", \"The candidate's tone-of-voice samples are attached as a PDF document.\");\n  if (tone && tone.kind === \"docx\") lines.push(\"\", \"Tone-of-voice samples (text extracted from .docx):\", tone.text);\n  return lines.join(\"\\n\");\n}\n\nfunction buildPromptSingle(form, cv, tone, approach) {\n  const lines = [\n    \"You are the in-house copywriter for Herald, a service that pitches candidates directly to companies over cold email.\",\n    \"\",\n    `Write exactly 1 cold outreach email pitching the candidate below for the role they want, using the approach \"${approach.name}\" — ${approach.tag}.`,\n    \"\",\n    \"Rules:\",\n    \"- 60 to 90 words. Subject line under 7 words.\",\n    \"- Use these Apollo merge variables literally where personalisation belongs: {{first_name}}, {{company}}, {{title}}, {{industry}}. Never invent recipient names or company names.\",\n    \"- Match the candidate's tone-of-voice samples if provided; otherwise professional but human.\",\n    \"- Reference the candidate's real experience. Sign off with the candidate's first name.\",\n    \"- Use \\\\n for line breaks inside the body.\",\n    '- Respond with ONLY a valid JSON object, no markdown fences, exactly: {\"subject\":\"...\",\"body\":\"...\"}',\n    \"\",\n    \"CANDIDATE PROFILE\",\n    `Name: ${form.name}`,\n    `Role they are pitching for: ${form.role}`,\n    `Email intention: ${form.intention}`,\n    `Experience and skills to reference: ${form.experience}`,\n    `Target people: ${form.targetPeople}`,\n    `Target industries: ${form.industries}`,\n    `Target company sizes: ${form.sizes.join(\", \")}`,\n    `Target locations: ${form.locations}`,\n  ];\n  if (cv && cv.kind === \"pdf\") lines.push(\"\", \"The candidate's CV is attached as a PDF document.\");\n  if (cv && cv.kind === \"docx\") lines.push(\"\", \"CV (text extracted from .docx):\", cv.text);\n  if (tone && tone.kind === \"pdf\") lines.push(\"\", \"The candidate's tone-of-voice samples are attached as a PDF document.\");\n  if (tone && tone.kind === \"docx\") lines.push(\"\", \"Tone-of-voice samples (text extracted from .docx):\", tone.text);\n  return lines.join(\"\\n\");\n}\n\nfunction fallbackDrafts(form) {\n  const first = (form.name || \"\").trim().split(/\\s+/)[0] || \"Me\";\n  const role = form.role || \"specialist\";\n  const ind = form.industries || \"your industry\";\n  const exp = (form.experience || \"\").trim();\n  const expShort = exp.length > 150 ? exp.slice(0, 150).trim() + \"…\" : exp || \"I bring hands-on experience and a track record of results.\";\n  return [\n    { approach: \"The Direct Pitch\", subject: `A ${role} for {{company}}`, body: `Hi {{first_name}},\\n\\nI'm ${first}, a ${role} focused on ${ind}. In short: ${expShort}\\n\\nI'm reaching out because I'd like to bring that to {{company}}. Open to a 15-minute call this week?\\n\\n${first}` },\n    { approach: \"The Problem-Solver\", subject: `The ${role} gap at {{company}}?`, body: `Hi {{first_name}},\\n\\nMost ${ind} teams I speak to share the same gap: the ${role} work everyone needs but nobody owns. That's the work I do. ${expShort}\\n\\nIf that sounds familiar at {{company}}, I'd love to compare notes.\\n\\n${first}` },\n    { approach: \"The Proof-Led\", subject: `What I'd bring to {{company}}`, body: `Hi {{first_name}},\\n\\nProof before pitch: ${expShort}\\n\\nI'm now looking for the right ${role} seat, and {{company}} is on my shortlist. Worth a short call?\\n\\n${first}` },\n    { approach: \"The Curious Question\", subject: `Quick question, {{first_name}}`, body: `Hi {{first_name}},\\n\\nIs {{company}} set up the way you want for ${role} work right now?\\n\\nIf not — that's exactly what I do, and I'd be glad to show you how I'd approach it. Ten minutes, any day this week.\\n\\n${first}` },\n    { approach: \"The Warm Familiar\", subject: `Long-time admirer of {{company}}`, body: `Hi {{first_name}},\\n\\nI've followed {{company}} for a while, so I'll keep this short: I'm a ${role}, and ${expShort}\\n\\nIf there's ever room for that on your team, I'd love to be first in line. Either way — keep it up.\\n\\n${first}` },\n  ];\n}\n\nasync function claudeComplete(payload) {\n  if (window.claude && window.claude.complete) {\n    return window.claude.complete(payload);\n  }\n  const res = await fetch(\"/.netlify/functions/claude\", {\n    method: \"POST\",\n    headers: { \"Content-Type\": \"application/json\" },\n    body: JSON.stringify(payload),\n  });\n  if (!res.ok) throw new Error(\"claude proxy error \" + res.status);\n  const data = await res.json();\n  return data.text;\n}\n\nclass Component extends DCLogic {\n  state = {\n    status: \"checking\", // checking | missing | loading | drafts\n    form: null,\n    cv: null,\n    tone: null,\n    drafts: [],\n    apiNote: \"\",\n    saved: false,\n    showModal: false,\n    loadIdx: 0,\n    redrafting: {},\n  };\n\n  bodyRefs = {};\n\n  async componentDidMount() {\n    this._onKey = (e) => {\n      if (e.key === \"Escape\" && this.state.showModal) this.setState({ showModal: false });\n    };\n    window.addEventListener(\"keydown\", this._onKey);\n\n    const saved = loadState();\n    if (!saved || !saved.form) {\n      this.setState({ status: \"missing\" });\n      return;\n    }\n    this.setState({ form: saved.form, cv: saved.cv || null, tone: saved.tone || null });\n    this.generate();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener(\"keydown\", this._onKey);\n    if (this._loadTimer) clearInterval(this._loadTimer);\n  }\n\n  startLoadingAnim() {\n    this.setState({ status: \"loading\", loadIdx: 0 });\n    this._loadTimer = setInterval(() => this.setState((s) => ({ loadIdx: (s.loadIdx + 1) % LOAD_MSGS.length })), 1700);\n  }\n\n  stopLoadingAnim() {\n    if (this._loadTimer) { clearInterval(this._loadTimer); this._loadTimer = null; }\n  }\n\n  async generate() {\n    const { form, cv, tone } = this.state;\n    this.setState({ apiNote: \"\" });\n    this.startLoadingAnim();\n    window.scrollTo({ top: 0 });\n\n    try {\n      const content = [];\n      if (cv && cv.kind === \"pdf\") content.push({ type: \"document\", source: { type: \"base64\", media_type: \"application/pdf\", data: cv.base64 } });\n      if (tone && tone.kind === \"pdf\") content.push({ type: \"document\", source: { type: \"base64\", media_type: \"application/pdf\", data: tone.base64 } });\n      content.push({ type: \"text\", text: buildPrompt(form, cv, tone) });\n\n      const text = await claudeComplete({\n        model: \"claude-sonnet-4-5\",\n        max_tokens: 2000,\n        messages: [{ role: \"user\", content }],\n      });\n      const start = text.indexOf(\"[\");\n      const end = text.lastIndexOf(\"]\");\n      if (start === -1 || end === -1) throw new Error(\"no json\");\n      const arr = JSON.parse(text.slice(start, end + 1));\n      const next = APPROACHES.map((a, i) => ({\n        approach: (arr[i] && arr[i].approach) || a.name,\n        subject: (arr[i] && arr[i].subject) || \"\",\n        body: (arr[i] && arr[i].body) || \"\",\n      }));\n      if (next.some((d) => !d.body.trim())) throw new Error(\"incomplete\");\n      this.setState({ drafts: next });\n    } catch (err) {\n      this.setState({\n        drafts: fallbackDrafts(form),\n        apiNote: \"Live drafting was unavailable just now, so these five follow Herald's house templates — edit freely, or press Redraft to try again.\",\n      });\n    }\n    this.stopLoadingAnim();\n    this.setState({ saved: false, status: \"drafts\" });\n  }\n\n  async redraftOne(i) {\n    const { form, cv, tone } = this.state;\n    const approach = APPROACHES[i];\n    this.setState((s) => ({ redrafting: { ...s.redrafting, [i]: true } }));\n\n    try {\n      const content = [];\n      if (cv && cv.kind === \"pdf\") content.push({ type: \"document\", source: { type: \"base64\", media_type: \"application/pdf\", data: cv.base64 } });\n      if (tone && tone.kind === \"pdf\") content.push({ type: \"document\", source: { type: \"base64\", media_type: \"application/pdf\", data: tone.base64 } });\n      content.push({ type: \"text\", text: buildPromptSingle(form, cv, tone, approach) });\n\n      const text = await claudeComplete({\n        model: \"claude-sonnet-4-5\",\n        max_tokens: 600,\n        messages: [{ role: \"user\", content }],\n      });\n      const start = text.indexOf(\"{\");\n      const end = text.lastIndexOf(\"}\");\n      if (start === -1 || end === -1) throw new Error(\"no json\");\n      const obj = JSON.parse(text.slice(start, end + 1));\n      if (!obj.body || !obj.body.trim()) throw new Error(\"incomplete\");\n      this.setState((s) => {\n        const drafts = s.drafts.slice();\n        drafts[i] = { ...drafts[i], subject: obj.subject || drafts[i].subject, body: obj.body };\n        return { drafts, saved: false };\n      });\n    } catch (err) {\n      const fresh = fallbackDrafts(form)[i];\n      this.setState((s) => {\n        const drafts = s.drafts.slice();\n        drafts[i] = { ...drafts[i], subject: fresh.subject, body: fresh.body };\n        return { drafts, saved: false };\n      });\n    }\n    this.setState((s) => ({ redrafting: { ...s.redrafting, [i]: false } }));\n  }\n\n  openAdvisorModal() {\n    this.setState({ saved: true, showModal: true });\n    this._initCalendlyAttempts = 0;\n    requestAnimationFrame(() => this.initCalendly());\n  }\n\n  initCalendly() {\n    const el = this.calendlyEl;\n    if (!el) return;\n    if (window.Calendly && window.Calendly.initInlineWidget) {\n      el.innerHTML = \"\";\n      window.Calendly.initInlineWidget({\n        url: \"https://calendly.com/finnhannah99/30min?hide_event_type_details=1&hide_gdpr_banner=1\",\n        parentElement: el,\n      });\n      return;\n    }\n    this._initCalendlyAttempts = (this._initCalendlyAttempts || 0) + 1;\n    if (this._initCalendlyAttempts < 40) {\n      setTimeout(() => this.initCalendly(), 150);\n    }\n  }\n\n  updateDraft(i, key, val) {\n    this.setState((s) => {\n      const drafts = s.drafts.slice();\n      drafts[i] = { ...drafts[i], [key]: val };\n      return { drafts, saved: false };\n    });\n  }\n\n  insertVar(i, token) {\n    const el = this.bodyRefs[i];\n    const cur = this.state.drafts[i].body;\n    let s = cur.length, e = cur.length;\n    if (el && typeof el.selectionStart === \"number\") { s = el.selectionStart; e = el.selectionEnd; }\n    this.updateDraft(i, \"body\", cur.slice(0, s) + token + cur.slice(e));\n    requestAnimationFrame(() => {\n      if (el) {\n        el.focus();\n        const p = s + token.length;\n        try { el.setSelectionRange(p, p); } catch (err) {}\n      }\n    });\n  }\n\n  renderVals() {\n    const { status, form, cv, tone, drafts, apiNote, saved, showModal, loadIdx, redrafting } = this.state;\n    const tint = this.props.tint ?? \"#007aff\";\n    const tintHalo = hexToRgba(tint, 0.18);\n    const tintGlowStrong = hexToRgba(tint, 0.16);\n    const tintDeep = hexToRgba(tint, 0.7);\n    const IRIDESCENT_HUES = [340, 300, 265, 245];\n    const accentAt = (i) => `oklch(58% 0.11 ${IRIDESCENT_HUES[i % IRIDESCENT_HUES.length]})`;\n    const accentSoftAt = (i) => `oklch(58% 0.11 ${IRIDESCENT_HUES[i % IRIDESCENT_HUES.length]} / 0.12)`;\n    const pageBg = `color-mix(in oklch, ${tint} 6%, #f2f2f7)`;\n    const activeStep = status === \"drafts\" && saved ? 3 : 2;\n\n    return {\n      tint, tintHalo, tintGlowStrong, tintDeep, pageBg,\n      isMissing: status === \"missing\",\n      isLoading: status === \"loading\",\n      isDrafts: status === \"drafts\",\n      steps: [[1, \"Questionnaire\"], [2, \"Drafts\"], [3, \"Advisor\"]].map(([n, label]) => {\n        const active = activeStep === n;\n        const done = activeStep > n;\n        return {\n          text: `0${n} ${label}`,\n          color: active ? \"#ffffff\" : done ? tint : \"rgba(60,60,67,0.6)\",\n          weight: active ? 700 : 600,\n          bg: active ? `linear-gradient(135deg, ${tint}, ${tintDeep})` : done ? hexToRgba(tint, 0.1) : \"rgba(255,255,255,0.5)\",\n          shadow: active ? `inset 0 1px 0 rgba(255,255,255,0.35), 0 6px 16px -8px ${tintGlowStrong}` : \"inset 0 1px 0 rgba(255,255,255,0.8)\",\n        };\n      }),\n      loadMsg: LOAD_MSGS[loadIdx],\n      caret: React.createElement(\"span\", {\n        \"aria-hidden\": true,\n        style: { display: \"inline-block\", width: \"0.5em\", height: \"1em\", background: tint, borderRadius: 2, animation: \"blink 1s steps(1) infinite\" },\n      }),\n      calendlyRef: (el) => { this.calendlyEl = el; },\n      draftsIntro: `Drafted from your answers${cv ? \", your CV\" : \"\"}${tone ? \" and your tone of voice\" : \"\"}. Edit anything.`,\n      fieldsToken: \"{{fields}}\",\n      hasApiNote: !!apiNote,\n      apiNote,\n      redraft: () => { if (window.confirm(\"Redraft all five emails? Your current edits will be replaced.\")) this.generate(); },\n      draftCards: drafts.map((d, i) => ({\n        i,\n        idx: i + 1,\n        accent: accentAt(i),\n        accentSoft: accentSoftAt(i),\n        approach: d.approach || APPROACHES[i].name,\n        tag: APPROACHES[i].tag,\n        words: String(d.body || \"\").trim().split(/\\s+/).filter(Boolean).length,\n        subject: d.subject,\n        body: d.body,\n        delay: `${i * 90}ms`,\n        onSubject: (e) => this.updateDraft(i, \"subject\", e.target.value),\n        onBody: (e) => this.updateDraft(i, \"body\", e.target.value),\n        bodyRef: (el) => { this.bodyRefs[i] = el; },\n        vars: APOLLO_VARS.map((v) => ({ token: v, insert: () => this.insertVar(i, v) })),\n        isRedrafting: !!(redrafting && redrafting[i]),\n        redraftLabel: redrafting && redrafting[i] ? \"Redrafting…\" : \"↻ Redraft this one\",\n        onRedraftOne: () => this.redraftOne(i),\n      })),\n      save: () => this.openAdvisorModal(),\n      saveLabel: saved ? \"Saved ✓\" : \"Save My Drafts\",\n      saveBg: saved ? \"#34c759\" : tint,\n      saveNote: saved ? \"Saved for your advisor call\" : \"Saving locks these in for your advisor call\",\n      showModal,\n      closeModal: () => this.setState({ showModal: false }),\n      stopProp: (e) => e.stopPropagation(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
