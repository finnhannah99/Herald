  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<link rel=\"icon\" type=\"image/png\" href=\"300695c8-7a90-4cca-bffb-06414fb1172e\">\n<script src=\"eaab8bb3-7f8b-42bf-9178-3af5c40dd6dc\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  html, body { margin: 0; padding: 0; }\n  * { box-sizing: border-box; font-optical-sizing: auto; }\n  input::placeholder, textarea::placeholder { color: rgba(60,60,67,0.38); }\n  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }\n  @keyframes floatA { 0%, 100% { transform: rotate(-8deg) translate(-58px, -60px); } 50% { transform: rotate(-6deg) translate(-58px, -74px); } }\n  @keyframes floatB { 0%, 100% { transform: rotate(5deg) translate(50px, 10px); } 50% { transform: rotate(7deg) translate(50px, -4px); } }\n  @keyframes floatC { 0%, 100% { transform: rotate(-2deg) translate(4px, 98px); } 50% { transform: rotate(0deg) translate(4px, 84px); } }\n  @keyframes driftA { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-24px, 18px); } }\n  @keyframes driftB { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px, -16px); } }\n  @keyframes hueShift { to { background-position: 200% center; } }\n  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }\n<\u002Fstyle>\n<script src=\"493d1b2f-60fb-4d8b-9d6e-81946d96334b\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; position: relative; background: {{ pageBg }}; color: #1d1d1f; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; overflow-x: hidden;\">\n\n  <!-- ==================== ambient depth field ==================== -->\n  <div style=\"position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;\">\n    <div style=\"position: absolute; top: -220px; left: 50%; width: 900px; height: 620px; transform: translateX(-50%); background: radial-gradient(circle at 30% 30%, {{ tintGlowStrong }}, transparent 60%), radial-gradient(circle at 75% 60%, rgba(255,45,85,0.10), transparent 55%); filter: blur(10px);\"><\u002Fdiv>\n    <div style=\"position: absolute; top: 60px; right: -160px; width: 640px; height: 640px; background: radial-gradient(circle, rgba(175,82,222,0.14), transparent 65%); filter: blur(6px); animation: driftA 14s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position: absolute; top: 380px; left: -140px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(255,149,0,0.12), transparent 65%); filter: blur(6px); animation: driftB 17s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position: absolute; top: 900px; left: 8%; width: 520px; height: 520px; background: radial-gradient(circle, rgba(52,199,89,0.08), transparent 65%); filter: blur(10px);\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ==================== nav bar ==================== -->\n  <div style=\"position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.55); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); box-shadow: 0 1px 0 rgba(0,0,0,0.04);\">\n    <div style=\"max-width: 760px; margin: 0 auto; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;\">\n      <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n        <span style=\"display: inline-block; font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: 36px; line-height: 1.3; font-weight: 700; letter-spacing: -0.015em; padding-right: 3px; background: linear-gradient(135deg, {{ tint }}, {{ tintDeep }}); -webkit-background-clip: text; background-clip: text; color: transparent\">Herald<span style=\"background: none; -webkit-background-clip: initial; background-clip: initial; color: #6363CC8C\">Out<\u002Fspan><\u002Fspan><span style=\"font-size: 12px; color: rgba(60,60,67,0.55);\">Job applications, done for you<\u002Fspan>\n      <\u002Fdiv><div style=\"display: flex; align-items: center; gap: 8px;\">\n        <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <span style=\"display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: {{ st.weight }}; letter-spacing: 0.02em; color: {{ st.color }}; background: {{ st.bg }}; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); border-radius: 999px; padding: 7px 13px; box-shadow: {{ st.shadow }}; transition: background .2s ease, color .2s ease;\">{{ st.text }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 96px;\">\n\n    <div style=\"position: sticky; top: 0; z-index: 5; min-height: 100vh; display: flex; flex-wrap: wrap; align-items: flex-start; padding-top: 15vh; gap: 24px; opacity: {{ heroOpacity }}; transform: {{ heroTransform }}; filter: {{ heroFilter }}; pointer-events: {{ heroPointer }}; width: 712px; height: 765px\">\n      <div style=\"flex: 1 1 300px; min-width: 260px; display: flex; flex-direction: column; gap: 18px; position: relative\">\n        <span style=\"display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: {{ tint }}; background: rgba(255,255,255,0.65); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 999px; padding: 8px 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 24px -14px {{ tintGlowStrong }}; position: relative; top: -20px;\">✦ Outreach, automated<\u002Fspan>\n        <h1 style=\"display: inline-block; font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: clamp(40px, 6.5vw, 68px); font-weight: 700; letter-spacing: -0.025em; line-height: 1.15; padding-right: 6px; margin: 0; background: {{ rainbowGradient }}; background-size: 250% auto; animation: hueShift 34s ease-in-out infinite alternate; -webkit-background-clip: text; background-clip: text; color: transparent;\">You pick the companies.<br>We write the letters.<\u002Fh1><p style=\"font-size: 18px; line-height: 1.55; color: rgba(60,60,67,0.78); max-width: 480px; margin: 0;\">Answer ten questions and HeraldOut drafts five tailored pitch emails in your voice — ready to review with an advisor and send to your target list.<\u002Fp>\n        <div style=\"font-size: 13px; font-weight: 600; color: {{ tint }};\">Step 1 · The questionnaire · about 5 minutes<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 10px; margin-top: 24px; opacity: {{ scrollCueOpacity }};\">\n          <span style=\"width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.6); backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 14px; color: {{ tint }}; animation: bob 1.8s ease-in-out infinite;\">↓<\u002Fspan>\n          <span style=\"font-size: 12px; letter-spacing: 0.06em; color: rgba(60,60,67,0.55);\">SCROLL TO BEGIN<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex: 0 1 320px; min-width: 250px; position: relative; height: 380px; display: flex; align-items: center; justify-content: center; overflow: visible; margin-top: 40px;\">\n        <div style=\"position: absolute; width: 255px; padding: 19px 21px; background: rgba(255,255,255,0.62); backdrop-filter: blur(22px) saturate(180%); -webkit-backdrop-filter: blur(22px) saturate(180%); border-radius: 18px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 24px 48px -20px rgba(0,0,0,0.22); transform: rotate(5deg) translate(50px, 10px); animation: floatB 8s ease-in-out infinite; z-index: 2; left: 59px; top: 147px\">\n          <div style=\"font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; color: {{ accentA }}; margin-bottom: 7px;\">THE DIRECT PITCH<\u002Fdiv>\n          <div style=\"font-size: 15px; font-weight: 600; color: #1d1d1f; margin-bottom: 5px;\">A growth marketer for {{ mergeCompany }}<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: rgba(60,60,67,0.6); line-height: 1.48;\">Hi {{ mergeFirst }}, I bring hands-on experience scaling…<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: absolute; width: 240px; padding: 17px 19px; background: rgba(255,255,255,0.5); backdrop-filter: blur(22px) saturate(180%); -webkit-backdrop-filter: blur(22px) saturate(180%); border-radius: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 18px 36px -18px rgba(0,0,0,0.16); transform: rotate(-2deg) translate(4px, 98px); animation: floatC 9s ease-in-out infinite; height: 125px; left: 2px; top: 171px\">\n          <div style=\"font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; color: {{ accentC }}; margin-bottom: 7px;\">THE PROOF-LED<\u002Fdiv>\n          <div style=\"font-size: 15px; font-weight: 600; color: #1d1d1f;\">What I'd bring to {{ mergeCompany }}<\u002Fdiv><div style=\"font-size: 12.5px; color: rgba(60,60,67,0.6); line-height: 1.48; width: 202px; height: 54px\">I automated my job applications, here's how I can help you....<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: absolute; width: 255px; padding: 19px 21px; background: rgba(255,255,255,0.55); backdrop-filter: blur(22px) saturate(180%); -webkit-backdrop-filter: blur(22px) saturate(180%); border-radius: 18px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 20px 40px -20px rgba(0,0,0,0.18); transform: rotate(-8deg) translate(-58px, -60px); animation: floatA 7s ease-in-out infinite; left: 50px; top: 115px\">\n          <div style=\"font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; color: {{ accentB }}; margin-bottom: 7px;\">THE CURIOUS QUESTION<\u002Fdiv>\n          <div style=\"font-size: 15px; font-weight: 600; color: #1d1d1f; margin-bottom: 5px;\">Quick question, {{ mergeFirst }}<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: rgba(60,60,67,0.6); line-height: 1.48;\">Is {{ mergeCompany }} set up the way you want…<\u002Fdiv>\n        <\u002Fdiv><div style=\"position: absolute; width: 73px; height: 70px; border-radius: 5%; background: radial-gradient(circle at 35% 30%, {{ tintSoft }}, transparent 70%); filter: blur(2px); animation: driftA 10s ease-in-out infinite; left: 41px; top: 199px\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Section A -->\n    <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-radius: 20px; padding: 28px; margin-bottom: 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 1px 0 rgba(0,0,0,0.03);\">\n      <div style=\"margin-bottom: 24px;\">\n        <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(60,60,67,0.55);\">Section A<\u002Fdiv>\n        <h2 style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: 22px; font-weight: 600; margin: 4px 0 0;\">About you<\u002Fh2>\n      <\u002Fdiv>\n      <sc-for list=\"{{ aboutFields }}\" as=\"f\" hint-placeholder-count=\"4\">\n        <div id=\"f-{{ f.id }}\" style=\"display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px;\">\n          <label for=\"in-{{ f.id }}\" style=\"font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px;\">\n            <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: {{ accentA }};\">{{ f.q }}<\u002Fspan>\n            <span>{{ f.label }}<\u002Fspan>\n          <\u002Flabel>\n          <sc-if value=\"{{ f.isTextarea }}\" hint-placehol {{ f.id }}\" style=\"display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px;\">\n          <label for=\"in-{{ f.id }}\" style=\"font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px;\">\n            <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: {{ accentB }};\">{{ f.q }}<\u002Fspan>\n            <span>{{ f.label }}<\u002Fspan>\n          <\u002Flabel>\n          <input id=\"in-{{ f.id }}\" type=\"text\" placeholder=\"{{ f.ph }}\" value=\"{{ f.value }}\" onchange=\"{{ f.onChange }}\" style=\"font-family: inherit; font-size: 17px; color: #1d1d1f; background: #f2f2f7; border: none; border-radius: 10px; padding: 11px 14px; height: 44px; width: 100%;\" style-focus=\"outline: none; box-shadow: 0 0 0 4px {{ tintHalo }};\">\n          <sc-if value=\"{{ f.hasError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size: 13px; color: #ff3b30;\">{{ f.error }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div id=\"f-sizes\" style=\"display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px;\">\n        <div style=\"font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px;\">\n          <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: {{ accentB }};\">Q7<\u002Fspan>\n          <span>What company size would you like to target?<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size: 13px; color: rgba(60,60,67,0.55);\">Pick as many bands as apply.<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n          <sc-for list=\"{{ sizeChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <button type=\"button\" onclick=\"{{ c.toggle }}\" aria-pressed=\"{{ c.on }}\" style=\"font-family: inherit; font-size: 15px; font-weight: 600; border: none; border-radius: 999px; padding: 11px 18px; min-height: 44px; cursor: pointer; background: {{ c.bg }}; color: {{ c.fg }};\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ sizesError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size: 13px; color: #ff3b30;\">Pick at least one size band.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ targetBFields }}\" as=\"f\" hint-placeholder-count=\"1\">\n        <div id=\"f-{{ f.id }}\" style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <label for=\"in-{{ f.id }}\" style=\"font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px;\">\n            <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: {{ accentB }};\">{{ f.q }}<\u002Fspan>\n            <span>{{ f.label }}<\u002Fspan>\n          <\u002Flabel>\n          <input id=\"in-{{ f.id }}\" type=\"text\" placeholder=\"{{ f.ph }}\" value=\"{{ f.value }}\" onchange=\"{{ f.onChange }}\" style=\"font-family: inherit; font-size: 17px; color: #1d1d1f; background: #f2f2f7; border: none; border-radius: 10px; padding: 11px 14px; height: 44px; width: 100%;\" style-focus=\"outline: none; box-shadow: 0 0 0 4px {{ tintHalo }};\">\n          <sc-if value=\"{{ f.hasError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size: 13px; color: #ff3b30;\">{{ f.error }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- Section C -->\n    <div style=\"background: rgba(255,255,255,0.72); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-radius: 20px; padding: 28px; margin-bottom: 28px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 1px 0 rgba(0,0,0,0.03);\">\n      <div style=\"margin-bottom: 24px;\">\n        <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(60,60,67,0.55);\">Section C<\u002Fdiv>\n        <h2 style=\"font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-size: 22px; font-weight: 600; margin: 4px 0 0;\">Your documents<\u002Fh2>\n      <\u002Fdiv>\n      <sc-for list=\"{{ uploads }}\" as=\"u\" hint-placeholder-count=\"2\">\n        <div id=\"f-{{ u.id }}\" style=\"display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px;\">\n          <div style=\"font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px;\">\n            <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: {{ accentC }};\">{{ u.q }}<\u002Fspan>\n            <span>{{ u.label }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size: 13px; color: rgba(60,60,67,0.55);\">{{ u.hint }}<\u002Fdiv>\n          <sc-if value=\"{{ u.hasFile }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; background: #f2f2f7; border-radius: 10px; padding: 12px 14px;\">\n              <div style=\"display: flex; align-items: center; gap: 10px; min-width: 0;\">\n                <span style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: #ffffff; background: {{ tint }}; border-radius: 6px; padding: 3px 7px;\">{{ u.fileKind }}<\u002Fspan>\n                <span style=\"font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 13px; color: #1d1d1f; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ u.fileName }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 16px; font-size: 15px;\">\n                <label style=\"color: {{ tint }}; font-weight: 600; cursor: pointer;\">Replace<input type=\"file\" accept=\".pdf,.docx\" onclick=\"{{ clearFileInput }}\" onchange=\"{{ u.onPick }}\" style=\"position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden;\"><\u002Flabel>\n                <button type=\"button\" onclick=\"{{ u.onClear }}\" style=\"font-family: inherit; font-size: 15px; font-weight: 600; color: rgba(60,60,67,0.78); background: none; border: none; cursor: pointer; padding: 0;\">Remove<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ u.noFile }}\" hint-placeholder-val=\"{{ true }}\">\n            <label style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 26px 16px; text-align: center; background: #f2f2f7; border-radius: 10px; cursor: pointer;\">\n              <span style=\"font-size: 15px; font-weight: 600; color: {{ tint }};\">Choose a File<\u002Fspan>\n              <span style=\"font-size: 12px; color: rgba(60,60,67,0.55);\">PDF or DOCX<\u002Fspan>\n              <input type=\"file\" accept=\".pdf,.docx\" onclick=\"{{ clearFileInput }}\" onchange=\"{{ u.onPick }}\" style=\"position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden;\">\n            <\u002Flabel>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ u.hasError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size: 13px; color: #ff3b30;\">{{ u.error }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; align-items: center; gap: 18px; flex-wrap: wrap;\">\n      <button type=\"button\" onclick=\"{{ generate }}\" disabled=\"{{ submitting }}\" style=\"font-family: inherit; font-size: 17px; font-weight: 600; color: #ffffff; background: {{ tint }}; border: none; border-radius: 12px; padding: 13px 24px; cursor: pointer;\">{{ generateLabel }}<\u002Fbutton>\n      <div style=\"font-size: 13px; color: rgba(60,60,67,0.55);\">Takes about a minute · Nothing is sent to anyone<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasErrors }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top: 12px; font-size: 15px; color: #ff3b30;\">A few answers are missing — check the highlighted questions above.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ==================== footer ==================== -->\n  <div style=\"position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 40px;\">\n    <div style=\"padding-top: 20px; box-shadow: 0 -1px 0 rgba(60,60,67,0.18) inset; border-top: 1px solid rgba(60,60,67,0.18); font-size: 11px; letter-spacing: 0.04em; color: rgba(60,60,67,0.55);\">HERALDOUT · PROTOTYPE — ANSWERS &amp; DRAFTS STAY IN THIS TAB; NOTHING IS STORED OR EMAILED YET<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst SIZE_OPTIONS = [\"0–50 employees\", \"50–250\", \"250–1,000\", \"1,000–5,000\", \"5,000+\"];\nconst FIELD_ORDER = [\"name\", \"role\", \"intention\", \"experience\", \"targetPeople\", \"industries\", \"sizes\", \"locations\", \"cv\"];\nconst TEXT_FIELDS = {\n  about: [\n    { id: \"name\", q: \"Q1\", label: \"Name\", type: \"text\", ph: \"Alex Morgan\" },\n    { id: \"role\", q: \"Q2\", label: \"What role do you envision yourself offering?\", type: \"text\", ph: \"e.g. Senior product designer, fractional CFO, growth marketer\" },\n    { id: \"intention\", q: \"Q3\", label: \"What is your email's intention?\", type: \"text\", ph: \"e.g. Land interviews, win freelance contracts, open conversations\" },\n    { id: \"experience\", q: \"Q4\", label: \"What experience or skills would you like to reference?\", type: \"textarea\", ph: \"The wins, numbers and skills your emails should lean on — one or two sentences is plenty\" },\n  ],\n  targetsA: [\n    { id: \"targetPeople\", q: \"Q5\", label: \"Who do you want to target?\", type: \"text\", ph: \"e.g. Heads of design, hiring managers, founders\" },\n    { id: \"industries\", q: \"Q6\", label: \"What industries would you like to target?\", type: \"text\", ph: \"e.g. Fintech, climate, healthcare\" },\n  ],\n  targetsB: [\n    { id: \"locations\", q: \"Q8\", label: \"What locations would you like to target?\", type: \"text\", ph: \"e.g. London, remote-first UK, EU\" },\n  ],\n};\n\nconst readB64 = (file) => new Promise((resolve, reject) => {\n  const r = new FileReader();\n  r.onload = () => resolve(String(r.result).split(\",\")[1]);\n  r.onerror = () => reject(new Error(\"read failed\"));\n  r.readAsDataURL(file);\n});\n\nfunction hexToRgba(hex, a) {\n  const h = (hex || \"#007aff\").replace(\"#\", \"\");\n  const n = parseInt(h.length === 3 ? h.split(\"\").map((c) => c + c).join(\"\") : h, 16);\n  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;\n}\n\nconst STORAGE_KEY = \"herald_state_v1\";\nfunction saveState(state) {\n  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (err) {}\n}\nfunction loadState() {\n  try {\n    const raw = sessionStorage.getItem(STORAGE_KEY);\n    return raw ? JSON.parse(raw) : null;\n  } catch (err) {\n    return null;\n  }\n}\n\nclass Component extends DCLogic {\n  state = {\n    form: { name: \"\", role: \"\", intention: \"\", experience: \"\", targetPeople: \"\", industries: \"\", sizes: [], locations: \"\" },\n    cv: null,\n    tone: null,\n    cvErr: \"\",\n    toneErr: \"\",\n    errors: {},\n    heroProgress: 0,\n    submitting: false,\n  };\n\n  componentDidMount() {\n    this._ticking = false;\n    this._onScroll = () => {\n      if (this._ticking) return;\n      this._ticking = true;\n      requestAnimationFrame(() => {\n        const span = Math.max(window.innerHeight * 0.85, 1);\n        const p = Math.min(1, Math.max(0, window.scrollY / span));\n        if (Math.abs(p - this.state.heroProgress) > 0.001) this.setState({ heroProgress: p });\n        this._ticking = false;\n      });\n    };\n    window.addEventListener(\"scroll\", this._onScroll, { passive: true });\n    this._onScroll();\n\n    // Restore answers if the visitor came back from the drafting page to edit them.\n    const saved = loadState();\n    if (saved && saved.form) {\n      this.setState({\n        form: { ...this.state.form, ...saved.form },\n        cv: saved.cv || null,\n        tone: saved.tone || null,\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener(\"scroll\", this._onScroll);\n  }\n\n  setField(id, val) {\n    this.setState((s) => ({ form: { ...s.form, [id]: val }, errors: s.errors[id] ? { ...s.errors, [id]: undefined } : s.errors }));\n  }\n\n  toggleSize(sz) {\n    this.setState((s) => ({\n      form: { ...s.form, sizes: s.form.sizes.includes(sz) ? s.form.sizes.filter((x) => x !== sz) : [...s.form.sizes, sz] },\n      errors: s.errors.sizes ? { ...s.errors, sizes: undefined } : s.errors,\n    }));\n  }\n\n  async handleFile(file, key) {\n    if (!file) return;\n    const errKey = key === \"cv\" ? \"cvErr\" : \"toneErr\";\n    const ext = file.name.toLowerCase().split(\".\").pop();\n    try {\n      if (ext === \"pdf\") {\n        const base64 = await readB64(file);\n        this.setState({ [key]: { name: file.name, kind: \"pdf\", base64 }, [errKey]: \"\" });\n      } else if (ext === \"docx\") {\n        if (!window.mammoth) throw new Error(\"mammoth unavailable\");\n        const arrayBuffer = await file.arrayBuffer();\n        const result = await window.mammoth.extractRawText({ arrayBuffer });\n        this.setState({ [key]: { name: file.name, kind: \"docx\", text: (result.value || \"\").slice(0, 6000) }, [errKey]: \"\" });\n      } else {\n        this.setState({ [errKey]: \"Upload a .pdf or .docx file.\" });\n        return;\n      }\n      this.setState((s) => (s.errors[key] ? { errors: { ...s.errors, [key]: undefined } } : null));\n    } catch (err) {\n      this.setState({ [errKey]: \"That file couldn't be read — try a different copy.\" });\n    }\n  }\n\n  validate() {\n    const { form, cv } = this.state;\n    const errs = {};\n    [\"name\", \"role\", \"intention\", \"experience\", \"targetPeople\", \"industries\", \"locations\"].forEach((id) => {\n      if (!String(form[id]).trim()) errs[id] = \"Needed for your drafts.\";\n    });\n    if (form.sizes.length === 0) errs.sizes = \"Pick at least one size band.\";\n    this.setState({ errors: errs });\n    const firstBad = FIELD_ORDER.find((k) => errs[k]);\n    if (firstBad) {\n      const el = document.getElementById(\"f-\" + firstBad);\n      if (el) {\n        const r = el.getBoundingClientRect();\n        window.scrollTo({ top: window.scrollY + r.top - window.innerHeight / 2 + r.height / 2, behavior: \"smooth\" });\n      }\n      return false;\n    }\n    return true;\n  }\n\n  async generate() {\n    if (!this.validate()) return;\n    this.setState({ submitting: true });\n    const { form, cv, tone } = this.state;\n    saveState({ form, cv, tone });\n    window.location.href = \"drafting.html\";\n  }\n\n  renderVals() {\n    const { form, cv, tone, cvErr, toneErr, errors, heroProgress, submitting } = this.state;\n    const tint = this.props.tint ?? \"#007aff\";\n    const tintHalo = hexToRgba(tint, 0.18);\n    const tintSoft = hexToRgba(tint, 0.1);\n    const tintGlowStrong = hexToRgba(tint, 0.16);\n    const tintDeep = hexToRgba(tint, 0.7);\n    const IRIDESCENT_HUES = [340, 300, 265, 245];\n    const accentAt = (i) => `oklch(58% 0.11 ${IRIDESCENT_HUES[i % IRIDESCENT_HUES.length]})`;\n    const accentA = accentAt(0), accentB = accentAt(1), accentC = accentAt(2);\n    const pageBg = `color-mix(in oklch, ${tint} 6%, #f2f2f7)`;\n    const sheenHues = [340, 300, 260];\n    const textStops = [...sheenHues, sheenHues[0]].map((h) => `oklch(65% 0.11 ${h})`).join(\", \");\n    const rainbowGradient = `linear-gradient(100deg, ${textStops})`;\n\n    const mkField = (f) => ({\n      ...f,\n      isTextarea: f.type === \"textarea\",\n      isInput: f.type !== \"textarea\",\n      value: form[f.id],\n      onChange: (e) => this.setField(f.id, e.target.value),\n      hasError: !!errors[f.id],\n      error: errors[f.id] || \"\",\n    });\n\n    const files = { cv, tone };\n    const fileErrs = { cv: errors.cv || cvErr, tone: toneErr };\n    const mkUpload = (id, q, label, hint) => ({\n      id, q, label, hint,\n      hasFile: !!files[id],\n      noFile: !files[id],\n      fileName: files[id] ? files[id].name : \"\",\n      fileKind: files[id] ? files[id].kind.toUpperCase() : \"\",\n      hasError: !!fileErrs[id],\n      error: fileErrs[id] || \"\",\n      onPick: (e) => this.handleFile(e.target.files && e.target.files[0], id),\n      onClear: () => this.setState({ [id]: null, [id === \"cv\" ? \"cvErr\" : \"toneErr\"]: \"\" }),\n    });\n\n    return {\n      tint, tintHalo, tintSoft, tintGlowStrong, tintDeep, accentA, accentB, accentC, pageBg, rainbowGradient,\n      heroOpacity: 1 - heroProgress,\n      heroTransform: `scale(${(1 - heroProgress * 0.07).toFixed(3)}) translateY(${(heroProgress * -34).toFixed(1)}px)`,\n      heroFilter: `blur(${(heroProgress * 7).toFixed(1)}px)`,\n      heroPointer: heroProgress > 0.75 ? \"none\" : \"auto\",\n      scrollCueOpacity: Math.max(0, 1 - heroProgress * 3.5).toFixed(2),\n      mergeCompany: \"{{company}}\",\n      mergeFirst: \"{{first_name}}\",\n      steps: [[1, \"Questionnaire\"], [2, \"Drafts\"], [3, \"Advisor\"]].map(([n, label]) => {\n        const active = n === 1;\n        return {\n          text: `0${n} ${label}`,\n          color: active ? \"#ffffff\" : \"rgba(60,60,67,0.6)\",\n          weight: active ? 700 : 600,\n          bg: active ? `linear-gradient(135deg, ${tint}, ${tintDeep})` : \"rgba(255,255,255,0.5)\",\n          shadow: active ? `inset 0 1px 0 rgba(255,255,255,0.35), 0 6px 16px -8px ${tintGlowStrong}` : \"inset 0 1px 0 rgba(255,255,255,0.8)\",\n        };\n      }),\n      aboutFields: TEXT_FIELDS.about.map(mkField),\n      targetAFields: TEXT_FIELDS.targetsA.map(mkField),\n      targetBFields: TEXT_FIELDS.targetsB.map(mkField),\n      sizeChips: SIZE_OPTIONS.map((sz) => {\n        const on = form.sizes.includes(sz);\n        return { label: sz, on, toggle: () => this.toggleSize(sz), bg: on ? tint : \"#f2f2f7\", fg: on ? \"#ffffff\" : \"#1d1d1f\" };\n      }),\n      sizesError: !!errors.sizes,\n      uploads: [\n        mkUpload(\"cv\", \"Q9\", \"Please upload a copy of your current CV (optional)\", \"PDF or DOCX. We draft from what's actually on the page.\"),\n        mkUpload(\"tone\", \"Q10\", \"Please upload a Tone of Voice document (optional)\", \"Optional but recommended — a PDF or DOCX of past emails you've written, so the drafts sound like you.\"),\n      ],\n      clearFileInput: (e) => { e.currentTarget.value = \"\"; },\n      generate: () => this.generate(),\n      submitting,\n      generateLabel: submitting ? \"Preparing…\" : \"Generate My Five Drafts\",\n      hasErrors: Object.values(errors).some(Boolean),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
